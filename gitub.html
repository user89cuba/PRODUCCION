<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página en GitHub</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background: #24292e;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #0366d6;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 20px;
        }

        section {
            background: white;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #24292e;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>Bienvenido a mi página web 🚀</h1>
    <p>Creada con GitHub Pages</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Sobre mí</a>
    <a href="#">Contacto</a>
</nav>

<main>
    <section>
        <h2>Sobre este proyecto</h2>
        <p>Esta es una página web básica usando HTML y CSS en un solo archivo.</p>
    </section>

    <section>
        <h2>Contacto</h2>
        <p>Puedes escribirme a: correo@ejemplo.com y al numero 7899908</p>
    </section>
</main>

<footer>
    <p>© 2026 - Mi sitio web</p>
</footer>

</body>
</html>
